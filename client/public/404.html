<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Afftestwork</title>
  <script>
    // GitHub Pages SPA fix — redirect 404s back to index with the path stored in sessionStorage
    var l = window.location;
    sessionStorage.redirect = l.href;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') + (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
  </script>
</head>
<body></body>
</html>
