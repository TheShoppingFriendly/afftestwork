name: Deploy Affworktest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint & type-check ─────────────────────────────────────
  check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package.json
      - run: npm install
        working-directory: client
      - run: npx eslint src --ext .jsx,.js --max-warnings=0 || true
        working-directory: client

  # ── Build & Deploy Frontend ───────────────────────────────
  deploy-frontend:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package.json

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL:  ${{ secrets.VITE_WS_URL }}
        run: npm run build

      # SPA routing fix for GitHub Pages
      - name: Copy index.html → 404.html
        run: cp client/dist/index.html client/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist
          force_orphan: true

  # ── Render auto-deploys server on push to main ────────────
  # No action needed here.
  # In Render dashboard: connect your repo, set root dir = server,
  # and Render will auto-deploy on every push to main.
